name: Usability PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: usability-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  collect_diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect PR changed files and patches
        run: node ".github/usability-review/scripts/collect-diff.js"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USABILITY_PR_DIFF_PATH: pr-diff.json

      - name: Upload diff artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-diff
          path: pr-diff.json

  usability_rules:
    runs-on: ubuntu-latest
    needs: collect_diff
    steps:
      - uses: actions/checkout@v4
      - name: Download diff artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-diff

      - name: Run deterministic usability checks
        id: rules
        run: node ".github/usability-review/scripts/run-deterministic-checks.js"
        continue-on-error: true
        env:
          USABILITY_PR_DIFF_PATH: pr-diff.json
          USABILITY_RULES_OUTPUT_PATH: rules-findings.json
          USABILITY_CONFIG_PATH: .github/usability-review/config/default.config.json

      - name: Upload deterministic findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rules-findings
          path: rules-findings.json

      - name: Comment deterministic failures on PR timeline
        if: steps.rules.outcome == 'failure'
        run: node ".github/usability-review/scripts/post-rules-failure-comment.js"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail on high-severity deterministic findings
        if: steps.rules.outcome == 'failure'
        run: exit 1

  usability_ai_review:
    runs-on: ubuntu-latest
    needs: [collect_diff]
    steps:
      - name: Checkout repository for rubric and skill
        uses: actions/checkout@v4

      - name: Download diff artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-diff

      - name: Run AI diff-agent adapter
        run: node ".github/usability-review/scripts/run-ai-review.js"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          USABILITY_PR_DIFF_PATH: pr-diff.json
          USABILITY_AI_OUTPUT_PATH: ai-findings.json
          USABILITY_CONFIG_PATH: .github/usability-review/config/default.config.json
          USABILITY_AI_SCHEMA_PATH: .github/usability-review/contracts/ai-review.schema.json
          USABILITY_RUBRIC_PATH: review-rubric.md
          USABILITY_SKILL_PATH: .cursor/skills/pr-usability-review/SKILL.md

      - name: Upload AI findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-findings
          path: ai-findings.json

  usability_summary:
    runs-on: ubuntu-latest
    needs: [usability_rules, usability_ai_review]
    if: always()
    steps:
      - name: Checkout repository for summary
        uses: actions/checkout@v4
    
      - name: Download deterministic findings
        uses: actions/download-artifact@v4
        with:
          name: rules-findings
          if-no-files-found: warn
        continue-on-error: true

      - name: Download AI findings
        uses: actions/download-artifact@v4
        with:
          name: ai-findings
          if-no-files-found: warn
        continue-on-error: true

      - name: Post consolidated summary comment
        run: node ".github/usability-review/scripts/post-summary.js"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
