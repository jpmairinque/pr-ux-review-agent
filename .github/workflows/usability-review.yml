name: Usability PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Review changed code for usability risks
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
            const owner = context.repo.owner
            const repo = context.repo.repo
            const pull_number = pr.number

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            })

            const findings = []
            const addFinding = (severity, file, message, suggestion) => {
              findings.push(`- ${severity} - \`${file}\`: ${message} Suggested fix: ${suggestion}`)
            }

            for (const file of files) {
              const patch = file.patch || ''
              if (!/\.(jsx|js|tsx|ts|css)$/i.test(file.filename) || !patch) continue

              // Heuristic: form controls should be labeled.
              const controls = patch.match(/<(input|select|textarea)\b[^>]*>/gi) || []
              for (const control of controls) {
                if (!/(aria-label|aria-labelledby|id|name)\s*=/.test(control)) {
                  addFinding(
                    'High',
                    file.filename,
                    'Potential unlabeled form control can reduce usability and accessibility.',
                    'Add an associated label, or aria-label/aria-labelledby with meaningful text.'
                  )
                  break
                }
              }

              // WCAG: clickable non-interactive elements must provide keyboard/focus semantics.
              const clickableNonInteractive = patch.match(/<(div|span)\b[^>]*onClick\s*=\s*[^>]*>/gi) || []
              for (const node of clickableNonInteractive) {
                if (!/(onKeyDown|role|tabIndex)\s*=/.test(node)) {
                  addFinding(
                    'High',
                    file.filename,
                    'Non-interactive element handles click without keyboard/focus support.',
                    'Use button semantics or add keyboard handlers with role and tabIndex.'
                  )
                  break
                }
              }

              // Responsive: large fixed pixel widths may break small screens.
              if (/(width|minWidth|maxWidth|min-width|max-width)\s*:\s*['"]?[4-9]\d{2,}px['"]?/i.test(patch)) {
                addFinding(
                  'Medium',
                  file.filename,
                  'Large fixed width may cause overflow on mobile.',
                  'Use responsive breakpoints, fluid widths, or clamp-based sizing.'
                )
              }
            }

            const header = '### Automated Usability Review\n'
            const body = findings.length
              ? `${header}\nFindings:\n${findings.join('\n')}\n\nReference rubric: \`review-rubric.md\``
              : `${header}\nNo major heuristic/WCAG/responsive issues detected in the diff.\n\nResidual risk:\n- Visual contrast and real-device behavior still need manual validation.`

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body,
            })

            if (findings.length) {
              core.setFailed(`Usability review found ${findings.length} issue(s).`)
            }
